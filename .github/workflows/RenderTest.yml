name: RenderTest
env:
  TF_ENABLE_ONEDNN_OPTS: 0

on:
  push:

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test Environment
        run: |
          python -m pip install --upgrade pip
          sudo apt-get install libglu1-mesa-dev xvfb
          python -m pip install pytest pytest-xvfb
      - name: Dependencies
        run: |
          python -m pip install .
#     - name: Test composite script 
#       run: |
#         cinema compose examples/scalar-images_config.yaml
      - name: Test using ModernGL
        run: |
          python -m pytest -s testing/RenderTest.py

  macos:
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
        os-version: [macos-14, macos-15, macos-26]

    runs-on: ${{ matrix.os-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install pytest
          python -m pip install .
#     - name: Test composite script 
#       run: |
#         cinema compose examples/scalar-images_config.yaml
      - name: Test using ModernGL
        run: |
          python -m pytest -s testing/RenderTest.py

